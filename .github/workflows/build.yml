name: Build and Release luci-app-nfs

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Extract version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0-$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Clean previous artifacts
        run: |
          rm -rf compiled/*

      - name: Build luci-app-nfs (ipk)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building IPK v$VERSION..."
          mkdir -p compiled/packages
          mkdir -p ipk_tmp/CONTROL
          echo "Package: luci-app-nfs" > ipk_tmp/CONTROL/control
          echo "Version: $VERSION-1" >> ipk_tmp/CONTROL/control
          echo "Architecture: all" >> ipk_tmp/CONTROL/control
          echo "Maintainer: Gemini CLI" >> ipk_tmp/CONTROL/control
          echo "Depends: luci-base, nfs-kernel-server" >> ipk_tmp/CONTROL/control
          echo "Description: LuCI app for NFS kernel server management" >> ipk_tmp/CONTROL/control
          cp -r source/luci-app-nfs/root ipk_tmp/
          cp -r source/luci-app-nfs/htdocs ipk_tmp/
          tar -cvzf compiled/packages/luci-app-nfs_${VERSION}-1_all.ipk -C ipk_tmp .

      - name: Build luci-app-nfs (apk)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building APK v$VERSION..."
          mkdir -p compiled/apk
          mkdir -p apk_tmp
          cp -r source/luci-app-nfs/* apk_tmp/
          echo "pkgver=$VERSION" > apk_tmp/.APKINDEX
          tar -cvzf compiled/apk/luci-app-nfs-${VERSION}-r1.apk -C apk_tmp .

      - name: Sync compiled output to repository
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compiled/
          git commit -m "Update compiled artifacts v${{ steps.get_version.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Failed to push"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            compiled/packages/*.ipk
            compiled/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
