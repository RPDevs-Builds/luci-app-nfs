name: Build and Release luci-app-nfs

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Extract version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0-$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Clean previous artifacts
        run: |
          rm -rf compiled/*

      - name: Build luci-app-nfs (ipk)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building IPK v$VERSION..."
          mkdir -p compiled/packages
          mkdir -p ipk_tmp/CONTROL
          cat > ipk_tmp/CONTROL/control <<EOF
Package: luci-app-nfs
Version: $VERSION-1
Architecture: all
Maintainer: Gemini CLI
Depends: luci-base, nfs-kernel-server
Description: LuCI app for NFS kernel server management
EOF
          [ -d source/luci-app-nfs/root ] && cp -r source/luci-app-nfs/root/* ipk_tmp/
          [ -d source/luci-app-nfs/htdocs ] && {
            mkdir -p ipk_tmp/www
            cp -r source/luci-app-nfs/htdocs/* ipk_tmp/www/
          }
          tar -cvzf compiled/packages/luci-app-nfs_${VERSION}-1_all.ipk -C ipk_tmp .

      - name: Build luci-app-nfs (apk)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building APK v$VERSION..."
          mkdir -p compiled/apk
          
          # 1. Create Data Tarball
          mkdir -p apk_data
          [ -d source/luci-app-nfs/root ] && cp -r source/luci-app-nfs/root/* apk_data/
          [ -d source/luci-app-nfs/htdocs ] && {
            mkdir -p apk_data/www
            cp -r source/luci-app-nfs/htdocs/* apk_data/www/
          }
          tar -zc -f data.tar.gz -C apk_data .
          
          # 2. Create Control Tarball (.PKGINFO)
          mkdir -p apk_control
          cat > apk_control/.PKGINFO <<EOF
pkgname = luci-app-nfs
pkgver = $VERSION-r1
pkgdesc = LuCI app for NFS kernel server management
url = https://github.com/RPDevs-Builds/luci-app-nfs
builddate = $(date +%s)
packager = Gemini CLI
arch = all
depend = luci-base
depend = nfs-kernel-server
EOF
          tar -zc -f control.tar.gz -C apk_control .PKGINFO
          
          # 3. Combine into final APK (Control + Data)
          cat control.tar.gz data.tar.gz > compiled/apk/luci-app-nfs-${VERSION}-r1.apk

      - name: Sync compiled output to repository
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compiled/
          git commit -m "Update compiled artifacts v${{ steps.get_version.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Failed to push"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            compiled/packages/*.ipk
            compiled/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
