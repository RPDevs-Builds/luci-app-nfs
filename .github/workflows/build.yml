name: Build and Release luci-app-nfs

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Extract version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.1-$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Clean previous artifacts
        run: |
          rm -rf compiled/*

      - name: Build luci-app-nfs (ipk)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building IPK v$VERSION..."
          mkdir -p compiled/packages
          mkdir -p ipk_tmp/CONTROL
          echo "Package: luci-app-nfs" > ipk_tmp/CONTROL/control
          echo "Version: $VERSION-1" >> ipk_tmp/CONTROL/control
          echo "Architecture: all" >> ipk_tmp/CONTROL/control
          echo "Maintainer: Gemini CLI" >> ipk_tmp/CONTROL/control
          echo "Depends: luci-base, nfs-kernel-server" >> ipk_tmp/CONTROL/control
          echo "Description: LuCI app for NFS kernel server management" >> ipk_tmp/CONTROL/control
          [ -d source/luci-app-nfs/root ] && cp -r source/luci-app-nfs/root/. ipk_tmp/
          [ -d source/luci-app-nfs/htdocs ] && {
            mkdir -p ipk_tmp/www
            cp -r source/luci-app-nfs/htdocs/. ipk_tmp/www/
          }
          tar -cvzf compiled/packages/luci-app-nfs_${VERSION}-1_all.ipk -C ipk_tmp .

      - name: Build luci-app-nfs (apk)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building APK v$VERSION..."
          mkdir -p compiled/apk
          
          # 1. Create Data Tarball
          mkdir -p apk_data
          [ -d source/luci-app-nfs/root ] && cp -r source/luci-app-nfs/root/. apk_data/
          [ -d source/luci-app-nfs/htdocs ] && {
            mkdir -p apk_data/www
            cp -r source/luci-app-nfs/htdocs/. apk_data/www/
          }
          tar -c --owner=0 --group=0 -C apk_data . | gzip -9n > data.tar.gz
          
          # 2. Create Control Tarball (.PKGINFO)
          mkdir -p apk_control
          echo "pkgname = luci-app-nfs" > apk_control/.PKGINFO
          echo "pkgver = $VERSION-r1" >> apk_control/.PKGINFO
          echo "pkgdesc = LuCI app for NFS kernel server management" >> apk_control/.PKGINFO
          echo "url = https://github.com/RPDevs-Builds/luci-app-nfs" >> apk_control/.PKGINFO
          echo "builddate = $(date +%s)" >> apk_control/.PKGINFO
          echo "packager = Gemini CLI" >> apk_control/.PKGINFO
          echo "arch = all" >> apk_control/.PKGINFO
          echo "depend = luci-base" >> apk_control/.PKGINFO
          echo "depend = nfs-kernel-server" >> apk_control/.PKGINFO
          tar -c --owner=0 --group=0 -C apk_control .PKGINFO | gzip -9n > control.tar.gz
          
          # 3. Combine into final APK (Control + Data)
          cat control.tar.gz data.tar.gz > compiled/apk/luci-app-nfs-${VERSION}-r1.apk

      - name: Create Source Tarball
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Creating source tarball v$VERSION..."
          mkdir -p compiled/source
          tar -cvzf compiled/source/luci-app-nfs-${VERSION}.tar.gz -C source/luci-app-nfs .

      - name: Sync compiled output to repository
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compiled/
          git commit -m "Update compiled artifacts v${{ steps.get_version.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Failed to push"

      - name: Update local mirror
        run: |
          sudo mkdir -p /shares/gitstore/openwrt/luci-app-nfs
          sudo chown -R $USER:$USER /shares/gitstore/openwrt
          [ -d /shares/gitstore/openwrt/luci-app-nfs/.git ] || git clone --mirror https://github.com/RPDevs-Builds/luci-app-nfs.git /shares/gitstore/openwrt/luci-app-nfs
          cd /shares/gitstore/openwrt/luci-app-nfs && git remote update

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

  test:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

      - name: Install on Router
        run: |
          APK_FILE=$(ls compiled/apk/luci-app-nfs-*.apk | head -n 1)
          echo "Testing installation of $APK_FILE"
          # Assuming the runner has SSH access to the router via keys
          scp "$APK_FILE" root@router.lan:/tmp/test.apk
          ssh root@router.lan "apk add --allow-untrusted /tmp/test.apk && /etc/init.d/nfsd reload"

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            compiled/packages/*.ipk
            compiled/apk/*.apk
            compiled/source/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
