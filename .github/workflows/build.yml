name: Build and Release luci-app-nfs

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Set up build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Extract version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.1-$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version $VERSION"

      - name: Clean previous artifacts
        run: |
          rm -rf compiled/*

      - name: Build luci-app-nfs (ipk)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building IPK v$VERSION..."
          mkdir -p compiled/packages
          mkdir -p ipk_tmp/CONTROL
          echo "Package: luci-app-nfs" > ipk_tmp/CONTROL/control
          echo "Version: $VERSION-1" >> ipk_tmp/CONTROL/control
          echo "Architecture: all" >> ipk_tmp/CONTROL/control
          echo "Maintainer: Gemini CLI" >> ipk_tmp/CONTROL/control
          echo "Depends: luci-base, nfs-kernel-server" >> ipk_tmp/CONTROL/control
          echo "Description: LuCI app for NFS kernel server management" >> ipk_tmp/CONTROL/control
          [ -d source/luci-app-nfs/root ] && cp -r source/luci-app-nfs/root/. ipk_tmp/
          [ -d source/luci-app-nfs/htdocs ] && {
            mkdir -p ipk_tmp/www
            cp -r source/luci-app-nfs/htdocs/. ipk_tmp/www/
          }
          tar -cvzf compiled/packages/luci-app-nfs_${VERSION}-1_all.ipk -C ipk_tmp .

      - name: Build luci-app-nfs (APK v3)
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Building APK v3 v$VERSION..."
          mkdir -p compiled/apk
          
          # Download static apk-tools v3 from Alpine Edge
          wget -qO apk.tar.gz https://dl-cdn.alpinelinux.org/alpine/edge/main/x86_64/apk-tools-static-3.0.6-r0.apk
          mkdir -p apk_tool
          tar -xzf apk.tar.gz -C apk_tool
          
          # Prepare data payload directory
          mkdir -p apk_data
          [ -d source/luci-app-nfs/root ] && cp -r source/luci-app-nfs/root/. apk_data/
          [ -d source/luci-app-nfs/htdocs ] && {
            mkdir -p apk_data/www
            cp -r source/luci-app-nfs/htdocs/. apk_data/www/
          }
          
          # Fix ownership and permissions for OpenWrt
          # APKv3 preserves these in the metadata
          sudo chown -R 0:0 apk_data
          sudo chmod 0755 apk_data/etc/init.d/nfs-luci
          
          # Generate APK v3 (ADBd) format using mkpkg
          ./apk_tool/sbin/apk.static mkpkg \
            --info name:luci-app-nfs \
            --info version:${VERSION}-r1 \
            --info description:"LuCI app for NFS kernel server management" \
            --info arch:all \
            --info license:Apache-2.0 \
            --info origin:luci-app-nfs \
            --info maintainer:"Gemini CLI" \
            --info url:"https://github.com/RPDevs-Builds/luci-app-nfs" \
            --info depends:luci-base \
            --files apk_data \
            --output compiled/apk/luci-app-nfs-${VERSION}-r1.apk

      - name: Create Source Tarball
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "Creating source tarball v$VERSION..."
          mkdir -p compiled/source
          tar -cvzf compiled/source/luci-app-nfs-${VERSION}.tar.gz -C source/luci-app-nfs .

      - name: Sync compiled output to repository
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compiled/
          git commit -m "Update compiled artifacts v${{ steps.get_version.outputs.VERSION }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Failed to push"

      - name: Update local mirror
        run: |
          sudo mkdir -p /shares/gitstore/openwrt
          sudo chown -R $(id -u):$(id -g) /shares/gitstore/openwrt
          if [ ! -d /shares/gitstore/openwrt/luci-app-nfs/.git ]; then
            rm -rf /shares/gitstore/openwrt/luci-app-nfs
            git clone --mirror https://github.com/RPDevs-Builds/luci-app-nfs.git /shares/gitstore/openwrt/luci-app-nfs
          else
            cd /shares/gitstore/openwrt/luci-app-nfs && git remote update
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            compiled/packages/*.ipk
            compiled/apk/*.apk
            compiled/source/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
