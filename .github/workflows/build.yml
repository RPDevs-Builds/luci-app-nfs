name: Build and Release luci-app-nfs

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Build luci-app-nfs (ipk)
        run: |
          echo "Building IPK..."
          mkdir -p compiled/packages
          tar -cvzf compiled/packages/luci-app-nfs_1.0-1_all.ipk -C source/luci-app-nfs .

      - name: Build luci-app-nfs (apk)
        run: |
          echo "Building APK..."
          mkdir -p compiled/apk
          tar -cvzf compiled/apk/luci-app-nfs-1.0-r1.apk -C source/luci-app-nfs .

      - name: Sync compiled output to repository
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compiled/
          git commit -m "Update compiled artifacts [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref }} || echo "Failed to push"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: luci-app-nfs-packages
          path: compiled/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            compiled/packages/*.ipk
            compiled/apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
